# Add to ~/.hermes/config.yaml
# Generated by hermes-ctx-enhance install.sh

hooks:
  pre_tool_call:
    - command: /path/to/hermes-ctx-enhance/hooks/ctx-redirect.sh
      matcher: terminal
  post_tool_call:
    - command: /path/to/hermes-ctx-enhance/hooks/session-capture.sh
  on_session_reset:
    - command: /path/to/hermes-ctx-enhance/hooks/session-guide.sh

hooks_auto_accept: true
